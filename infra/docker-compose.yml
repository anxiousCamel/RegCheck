services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: regcheck
      POSTGRES_PASSWORD: regcheck
      POSTGRES_DB: regcheck
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data

  # Auto-create the bucket on startup
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/regcheck --ignore-existing;
      mc anonymous set download local/regcheck;
      exit 0;
      "

  # CORS proxy not needed — API proxies file downloads

volumes:
  postgres_data:
  redis_data:
  minio_data:
